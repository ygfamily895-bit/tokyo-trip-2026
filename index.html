<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京獨旅 2026 · 雲端行程</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Serif+Display&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--card:#fff;--border:#e8e4dc;--text:#1e1d1a;--muted:#88857f;
  --accent:#c84b31;--accent2:#3a5a8c;--shadow:0 2px 12px rgba(0,0,0,.07);--radius:10px;
  --cat-transit:#888580;--cat-tokyo:#3a5a8c;--cat-daytrip:#6b4fa0;
  --cat-event:#c84b31;--cat-yokohama:#1a7a6e;--cat-shopping:#b8760a;--cat-free:#bbb;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* ── LOGIN SCREEN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
}
.login-card{
  background:#fff;border-radius:20px;padding:52px 44px;text-align:center;
  max-width:380px;width:90%;box-shadow:0 30px 80px rgba(0,0,0,.35);
}
.login-card .logo{font-size:42px;margin-bottom:16px}
.login-card h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:#1e1d1a;margin-bottom:6px}
.login-card p{font-size:13px;color:#888;margin-bottom:32px}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 20px;border-radius:12px;border:1.5px solid #e0ddd6;
  background:#fff;color:#1e1d1a;font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.google-btn:hover{background:#f8f6f2;border-color:#c8c4bc;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.login-note{font-size:11px;color:#aaa;margin-top:20px}

/* ── LOADING ── */
#loading-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);gap:16px;
}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── APP ── */
#app{display:none}

/* ── HEADER ── */
/* ── COVER ── */
.cover{
  position:relative;min-height:200px;
  background:#1a1a2e;
  display:flex;flex-direction:column;justify-content:flex-end;
}
.cover-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:0.45;pointer-events:none;
  transition:opacity .4s;
}
.cover-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(10,10,30,0.1) 0%,rgba(10,10,30,0.75) 100%);
  pointer-events:none;
}
.cover-body{
  position:relative;z-index:2;
  padding:28px 28px 20px;
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.cover-text{flex:1;min-width:0}
.cover-title{
  font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:#fff;
  outline:none;background:transparent;border:none;width:100%;
  text-shadow:0 1px 8px rgba(0,0,0,.5);cursor:text;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cover-title:focus{
  background:rgba(255,255,255,.1);border-radius:6px;
  padding:2px 8px;text-overflow:clip;
}
.cover-title::placeholder{color:rgba(255,255,255,.4)}
.cover-subtitle{
  font-size:12px;color:rgba(200,200,220,.85);margin-top:4px;
  outline:none;background:transparent;border:none;width:100%;
  cursor:text;letter-spacing:.5px;
}
.cover-subtitle:focus{background:rgba(255,255,255,.08);border-radius:4px;padding:1px 6px}
.cover-subtitle::placeholder{color:rgba(200,200,220,.4)}
.cover-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.cover-img-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:8px;font-size:11px;font-weight:700;
  border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);
  color:#fff;cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;
}
.cover-img-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}
/* preset picker - fixed overlay */
.cover-preset-panel{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.cover-preset-panel.hidden{display:none}
.preset-inner{
  background:#1a1a2e;border-radius:16px;padding:24px;
  width:100%;max-width:640px;max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.preset-inner h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:.5px}
.preset-section-label{font-size:10px;color:rgba(200,200,220,.6);letter-spacing:.8px;font-weight:700;text-transform:uppercase;margin:14px 0 8px}
.preset-grid{display:flex;gap:10px;flex-wrap:wrap}
.preset-swatch-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.preset-swatch{
  width:80px;height:50px;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:all .15s;overflow:hidden;
  flex-shrink:0;
}
.preset-swatch:hover,.preset-swatch.active{border-color:#fff;transform:scale(1.05)}
.preset-swatch img{width:100%;height:100%;object-fit:cover;display:block}
.preset-swatch-color{width:100%;height:100%}
.preset-swatch-name{font-size:10px;color:rgba(200,200,220,.7);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset-actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.preset-label{font-size:10px;color:rgba(200,200,220,.7);margin-bottom:6px;letter-spacing:.5px;font-weight:700}
/* ── TOPBAR ── */
.topbar{
  background:#1a1a2e;color:#fff;padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.07);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.user-info{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.user-name{font-size:12px;color:#c0c0d8}
.topbar-right{display:flex;gap:7px;flex-wrap:wrap;align-items:center}


.sync-status{
  display:flex;align-items:center;gap:6px;
  font-size:11px;padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.1);color:#a0a8c0;
  transition:all .3s;
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
.sync-status.saving .sync-dot{background:#facc15;animation:pulse .8s ease-in-out infinite}
.sync-status.error .sync-dot{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;
  border:none;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#a83a22}
.btn-secondary{background:rgba(255,255,255,.12);color:#fff}
.btn-secondary:hover{background:rgba(255,255,255,.22)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:#f0ede8}
.btn-danger{background:#fdecea;color:var(--accent)}
.btn-danger:hover{background:#fbd5d0}

/* ── TOOLBAR ── */
.toolbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:9px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.toolbar-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px}
.filter-btn{
  padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;
  border:1.5px solid transparent;cursor:pointer;background:#f0ede8;color:var(--muted);
  transition:all .15s;display:inline-flex;align-items:center;gap:4px;
}
.filter-btn.active,.filter-btn:hover{background:var(--text);color:#fff}
.filter-btn.active .filter-btn-label,.filter-btn:hover .filter-btn-label{color:#fff}
.filter-btn-label{
  outline:none;border:none;background:transparent;
  font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;
  color:inherit;cursor:pointer;min-width:10px;
}
.filter-all{background:#e8e4dc;color:#444}
.filter-all.active,.filter-all:hover{background:var(--text);color:#fff}

/* ── MAIN ── */
.main{max-width:880px;margin:0 auto;padding:24px 16px 80px}
.week-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:22px 0 8px 4px}

/* ── DAY CARD ── */
.day-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;border-left:5px solid #ccc;
  margin-bottom:10px;transition:box-shadow .2s;
}
.day-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.11)}
.day-card[data-cat=transit]{border-left-color:var(--cat-transit)}
.day-card[data-cat=tokyo]{border-left-color:var(--cat-tokyo)}
.day-card[data-cat=daytrip]{border-left-color:var(--cat-daytrip)}
.day-card[data-cat=event]{border-left-color:var(--cat-event)}
.day-card[data-cat=yokohama]{border-left-color:var(--cat-yokohama)}
.day-card[data-cat=shopping]{border-left-color:var(--cat-shopping)}
.day-card[data-cat=free]{border-left-color:var(--cat-free)}

.day-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px 10px;
  cursor:pointer;user-select:none;
}
.day-header:hover{background:#fafaf8}
.day-num{
  font-size:10px;font-weight:700;letter-spacing:1px;
  background:#f0ede8;color:#666;padding:2px 8px;border-radius:12px;white-space:nowrap;
}
[data-cat=event] .day-num{background:#fdecea;color:var(--accent)}
[data-cat=daytrip] .day-num{background:#f1ecf8;color:#6b4fa0}
[data-cat=tokyo] .day-num{background:#eaeffb;color:var(--accent2)}
.day-title-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.day-emoji{font-size:15px;cursor:pointer;flex-shrink:0}
.day-title-text{
  font-size:14px;font-weight:700;outline:none;border:none;background:transparent;
  font-family:'Noto Sans TC',sans-serif;color:var(--text);width:100%;
}
.day-title-text:focus{background:#f8f6f2;border-radius:4px;padding:1px 6px}
.cat-select{
  border:none;background:transparent;font-size:11px;color:var(--muted);
  cursor:pointer;outline:none;font-family:'Noto Sans TC',sans-serif;padding:2px 4px;
}
.cat-select:focus{background:#f0ede8;border-radius:4px}
.day-date-input{
  font-size:11px;color:var(--muted);border:none;background:transparent;
  font-family:'Noto Sans TC',sans-serif;text-align:right;outline:none;width:100px;
}
.day-date-input:focus{background:#f0ede8;border-radius:4px;padding:0 4px}
.icon-btn{
  background:none;border:none;cursor:pointer;padding:3px 5px;
  border-radius:5px;font-size:13px;color:var(--muted);transition:all .12s;
}
.icon-btn:hover{background:#f0ede8}
.icon-btn.del:hover{background:#fdecea;color:var(--accent)}
.collapse-btn{
  background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:15px;padding:0 2px;transition:transform .2s;line-height:1;
}
.day-card.collapsed .collapse-btn{transform:rotate(-90deg)}

/* ── DAY BODY ── */
.day-body{padding:4px 16px 12px;border-top:1px solid var(--border)}
.day-card.collapsed .day-body{display:none}
.stop-list{list-style:none}
.stop-item{
  display:flex;align-items:flex-start;gap:8px;padding:6px 4px 8px;
  border-bottom:1px dashed #f0ede8;position:relative;
  transition:background .15s;border-radius:6px;flex-wrap:wrap;
}
.stop-item:last-child{border-bottom:none}
.stop-item:hover{background:#fafaf8}
.stop-item.dragging{opacity:.35}
.stop-item.drag-over{border-top:2px solid var(--accent2)}
.drag-handle{cursor:grab;color:#ccc;font-size:13px;padding-top:5px;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
.stop-icon-wrap{flex-shrink:0;margin-top:2px;position:relative}
.stop-icon-select{
  width:26px;height:26px;border-radius:50%;border:none;background:#f0ede8;
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.stop-icon-select:hover{background:#e8e4dc}
.stop-content{flex:1;min-width:0}
.stop-name-input{
  font-size:13px;font-weight:600;border:none;background:transparent;outline:none;
  font-family:'Noto Sans TC',sans-serif;color:var(--text);width:100%;padding:1px 4px;border-radius:4px;
}
.stop-name-input:focus{background:#f5f3ef}
.stop-note-input{
  font-size:11.5px;color:var(--muted);border:none;background:transparent;outline:none;
  font-family:'Noto Sans TC',sans-serif;width:100%;margin-top:1px;
  padding:1px 4px;border-radius:4px;resize:none;overflow:hidden;
  line-height:1.6;min-height:20px;display:block;box-sizing:border-box;
}
.stop-note-input:focus{background:#f5f3ef;color:var(--text)}
.stop-actions{display:flex;gap:3px;align-items:flex-start;padding-top:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.stop-item:hover .stop-actions{opacity:1}
.stop-extra{width:100%;padding-left:42px;margin-top:4px;display:flex;flex-direction:column;gap:5px}
.stop-field{border:1px solid #ece8e0;border-radius:7px;overflow:hidden;background:#fff}
.stop-field-header{display:flex;align-items:center;gap:6px;padding:4px 9px;background:#f5f3ef;border-bottom:1px solid #ece8e0}
.stop-field-label{
  font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;
  border:none;background:transparent;outline:none;
  font-family:'Noto Sans TC',sans-serif;flex:1;
}
.stop-field-label:focus{background:#ebe8e0;border-radius:3px;padding:0 4px}
.stop-field-label::placeholder{font-weight:400;letter-spacing:0}
.stop-field-body{
  font-size:12.5px;color:var(--text);border:none;background:transparent;outline:none;
  font-family:'Noto Sans TC',sans-serif;width:100%;padding:6px 10px;
  resize:none;overflow:hidden;line-height:1.7;min-height:32px;display:block;box-sizing:border-box;
}
.stop-field-body:focus{background:#fafaf8}
.stop-field-body::placeholder{color:#ccc}
.stop-field-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0}
.stop-field-del:hover{background:#fdecea;color:var(--accent)}
.add-stop-field-btn{
  display:inline-flex;align-items:center;gap:4px;background:none;
  border:1px dashed #d0cdc5;border-radius:6px;padding:3px 9px;
  color:#aaa;font-size:11px;cursor:pointer;align-self:flex-start;
  font-family:'Noto Sans TC',sans-serif;transition:all .15s;
}
.add-stop-field-btn:hover{border-color:#9b59b6;color:#6b4fa0;background:#f8f4ff}
.stop-item:hover .stop-actions{opacity:1}
.tip-row{margin-top:8px;display:flex;align-items:flex-start;gap:8px}
.tip-box-editable{
  background:#fffbea;border:1px solid #f8e68a;border-left:3px solid #f0d040;
  border-radius:8px;padding:7px 11px;font-size:12px;color:#7a6500;flex:1;
  outline:none;min-height:30px;word-break:break-word;
}
.tip-box-editable:focus{background:#fff9e0}
.tip-box-editable:empty::before{content:attr(data-placeholder);color:#c8b84a}
.add-stop-btn{
  display:flex;align-items:center;gap:5px;background:none;
  border:1.5px dashed #d8d4cc;border-radius:8px;padding:6px 12px;
  color:var(--muted);font-size:12px;cursor:pointer;margin-top:7px;width:100%;
  font-family:'Noto Sans TC',sans-serif;transition:all .15s;
}
.add-stop-btn:hover{border-color:var(--accent2);color:var(--accent2);background:#f0f4fb}
.custom-fields{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.custom-field{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fafaf8}
.custom-field-header{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#f3f1ec;border-bottom:1px solid var(--border)}
.custom-field-label{font-size:11px;font-weight:700;color:var(--muted);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;flex:1;letter-spacing:.3px;text-transform:uppercase}
.custom-field-label:focus{background:#ebe8e0;border-radius:3px;padding:0 4px}
.custom-field-label::placeholder{text-transform:none}
.custom-field-body{font-size:13px;color:var(--text);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;width:100%;padding:7px 10px;resize:none;overflow:hidden;line-height:1.7;min-height:36px;display:block;box-sizing:border-box}
.custom-field-body:focus{background:#f5f3ef}
.custom-field-body:empty::before{content:attr(data-placeholder);color:#bbb}
.field-del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0}
.field-del-btn:hover{background:#fdecea;color:var(--accent)}
.add-field-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed #d8d4cc;border-radius:8px;padding:5px 12px;color:var(--muted);font-size:11px;cursor:pointer;margin-top:4px;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-field-btn:hover{border-color:#9b59b6;color:#6b4fa0;background:#f8f4ff}
.add-day-wrap{max-width:880px;margin:0 auto 40px;padding:0 16px}
.add-day-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:none;border:2px dashed #d8d4cc;border-radius:var(--radius);
  padding:14px;color:var(--muted);font-size:13px;cursor:pointer;width:100%;
  font-family:'Noto Sans TC',sans-serif;transition:all .15s;
}
.add-day-btn:hover{border-color:var(--accent);color:var(--accent);background:#fdf5f3}

/* ── EMOJI PICKER ── */
.emoji-picker{
  position:absolute;z-index:200;left:0;top:32px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);
  padding:8px;display:grid;grid-template-columns:repeat(6,1fr);gap:3px;width:196px;
}
.emoji-picker span{
  cursor:pointer;font-size:17px;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;border-radius:5px;
}
.emoji-picker span:hover{background:#f0ede8}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px);
}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:14px;padding:26px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:17px;margin-bottom:16px}
.modal-fields{display:grid;gap:11px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.5px}
.field input,.field select{
  width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);
  font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--bg);outline:none;
}
.field input:focus,.field select:focus{border-color:var(--accent2)}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;background:#1e1d1a;color:#fff;
  padding:9px 16px;border-radius:10px;font-size:13px;font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.25);transform:translateY(60px);opacity:0;
  transition:all .3s;z-index:9999;
}
.toast.show{transform:translateY(0);opacity:1}

/* ── HIDDEN ── */
.hidden{display:none!important}

@media(max-width:600px){
  .topbar{padding:10px 12px}
  .cover-title{font-size:22px}
  .cover-body{padding:20px 16px 16px}
  .main{padding:16px 10px 60px}
  .toolbar{padding:8px 14px}
  .user-name{display:none}
}

    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('app').style.display = 'none';
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  }
});

async function loadData() {
  try {
    const ref = doc(db, 'trips', currentUser.uid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      DATA = snap.data();
    } else {
      DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
      await setDoc(ref, DATA);
    }
    render();
    applyCover();
  } catch(e) {
    toast('載入失敗：' + e.message);
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    render();
    applyCover();
  }
}

function subscribeToChanges() {
  if (!currentUser) return;
  const ref = doc(db, 'trips', currentUser.uid);
  unsubscribe = onSnapshot(ref, snap => {
    if (snap.exists() && !isFirstLoad) {
      const remote = snap.data();
      if (JSON.stringify(remote) !== JSON.stringify(DATA)) {
        DATA = remote;
        render();
        applyCover();
        setSyncStatus('synced');
      }
    }
    isFirstLoad = false;
  });
}

async function saveToFirestore() {
  if (!currentUser) return;
  setSyncStatus('saving');
  try {
    await setDoc(doc(db, 'trips', currentUser.uid), DATA);
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
    toast('儲存失敗：' + e.message);
  }
}

function scheduleSave() {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirestore, 1200);
}

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  const dot = el.querySelector('.sync-dot');
  const txt = document.getElementById('syncText');
  el.className = 'sync-status ' + s;
  if (s === 'saving') { dot.style.background='#facc15'; txt.textContent='儲存中…'; }
  else if (s === 'synced') { dot.style.background='#4ade80'; txt.textContent='已同步'; }
  else { dot.style.background='#f87171'; txt.textContent='同步失敗'; }
}

// ── RENDER ──
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

    const sec = document.createElement('div');
    sec.className = 'day-section';

    sec.innerHTML = renderDay(day);
    main.appendChild(sec);

  });

}

function renderDay(day) {

      <span class="day-num">${esc(day.num)}</span>

      <select class="cat-select" onclick="event.stopPropagation()"

          `<option value="${c}"${day.cat===c?' selected':''}>${catL(c)}</option>`).join('')}

      <div class="tip-row">
        <div class="tip-box-editable" contenteditable="true" data-placeholder="💡 新增備忘或小貼士…"
          onblur="updateDay('${day.id}','tip',this.innerText.trim())">${esc(day.tip)}</div>
      </div>

      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <button class="add-stop-btn" style="flex:1;min-width:120px" onclick="addStop('${day.id}')">＋ 新增行程</button>

function renderStop(s, dayId) {
  const stopFields = (s.fields||[]).map(f => renderStopField(f, s.id, dayId)).join('');
  return `<li class="stop-item" draggable="true" data-id="${s.id}" data-day="${dayId}">
    <span class="drag-handle">⠿</span>

      <textarea class="stop-note-input"
        onchange="updateStop('${dayId}','${s.id}','note',this.value)"
        oninput="autoResize(this)" placeholder="備注：交通方式、提醒…">${esc(s.note)}</textarea>

function renderStopField(f, stopId, dayId) {
  return `<div class="stop-field" data-sfid="${f.id}">
    <div class="stop-field-header">
      <input class="stop-field-label" value="${escA(f.label)}"

    </div>
    <textarea class="stop-field-body"
      oninput="autoResize(this)"
      onchange="updateStopField('${dayId}','${stopId}','${f.id}','body',this.value)"
      placeholder="輸入內容…">${esc(f.body)}</textarea>
  </div>`;
}

function renderField(f, dayId) {
  return `<div class="custom-field" data-fid="${f.id}" data-day="${dayId}">
    <div class="custom-field-header">
      <input class="custom-field-label" value="${escA(f.label)}"
        onchange="updateField('${dayId}','${f.id}','label',this.value)"
        placeholder="欄位名稱（如：交通路線、購物清單）">
      <button class="field-del-btn" onclick="deleteField('${dayId}','${f.id}')" title="刪除欄位">✕</button>
    </div>
    <textarea class="custom-field-body"
      oninput="autoResize(this)"
      onchange="updateField('${dayId}','${f.id}','body',this.value)"
      placeholder="輸入內容…">${esc(f.body)}</textarea>
  </div>`;
}
function catL(c){return{transit:'抵返',tokyo:'東京',daytrip:'近郊',event:'演唱會',yokohama:'橫濱',shopping:'採買',free:'待規劃'}[c]||c}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escA(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function autoResize(ta){
  ta.style.height='auto';
  ta.style.height=(ta.scrollHeight)+'px';
}
function autoResizeAll(){
  document.querySelectorAll('.stop-note-input').forEach(autoResize);
}

function bindDayEvents(sec, day) {
  requestAnimationFrame(()=>{
    sec.querySelectorAll('.stop-note-input, .custom-field-body, .stop-field-body').forEach(autoResize);
  });
  let dragSrc=null, dragSrcDay=null;
  sec.querySelectorAll('.stop-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragSrc=item.getAttribute('data-id');
      dragSrcDay=item.getAttribute('data-day');
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over')});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      if(dragSrc===item.getAttribute('data-id'))return;
      moveStop(dragSrcDay,dragSrc,item.getAttribute('data-day'),item.getAttribute('data-id'));
    });
  });
}

// ── DATA OPS ──
window.updateDay=(dayId,field,val)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(d){d[field]=val;scheduleSave();}
};
window.updateStop=(dayId,stopId,field,val)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  const s=d.stops.find(x=>x.id===stopId);
  if(s){s[field]=val;scheduleSave();}
};
window.toggleCollapse=(dayId,e)=>{
  if(['INPUT','SELECT','BUTTON','TEXTAREA'].includes(e.target.tagName))return;
  const card=document.querySelector(`.day-card[data-id="${dayId}"]`);
  if(card)card.classList.toggle('collapsed');
};
window.deleteDay=(dayId)=>{
  if(!confirm('確定要刪除這天嗎？'))return;
  DATA.days=DATA.days.filter(d=>d.id!==dayId);
  render();scheduleSave();toast('已刪除');
};
window.addStop=(dayId)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  const id='s'+Date.now();
  d.stops.push({id,icon:'📍',name:'',note:''});
  render();
  setTimeout(()=>{const el=document.querySelector(`[data-id="${id}"] .stop-name-input`);if(el)el.focus()},50);
};
window.deleteStop=(dayId,stopId)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  d.stops=d.stops.filter(s=>s.id!==stopId);
  render();scheduleSave();
};
window.addField=(dayId)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  if(!d.fields)d.fields=[];
  const id='f'+Date.now();
  d.fields.push({id,label:'',body:''});
  render();scheduleSave();
  setTimeout(()=>{
    const el=document.querySelector(`.custom-field[data-fid="${id}"] .custom-field-label`);
    if(el)el.focus();
  },50);
};
window.updateField=(dayId,fieldId,key,val)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d||!d.fields)return;
  const f=d.fields.find(x=>x.id===fieldId);
  if(f){f[key]=val;scheduleSave();}
};
window.deleteField=(dayId,fieldId)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d||!d.fields)return;
  d.fields=d.fields.filter(f=>f.id!==fieldId);
  render();scheduleSave();
};
// ── STOP-LEVEL FIELDS ──
window.addStopField=(dayId,stopId)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  const s=d.stops.find(x=>x.id===stopId);
  if(!s)return;
  if(!s.fields)s.fields=[];
  const id='sf'+Date.now();
  s.fields.push({id,label:'',body:''});
  render();scheduleSave();
  setTimeout(()=>{
    const el=document.querySelector(`.stop-field[data-sfid="${id}"] .stop-field-label`);
    if(el)el.focus();
  },50);
};
window.updateStopField=(dayId,stopId,fieldId,key,val)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  const s=d.stops.find(x=>x.id===stopId);
  if(!s||!s.fields)return;
  const f=s.fields.find(x=>x.id===fieldId);
  if(f){f[key]=val;scheduleSave();}
};
window.deleteStopField=(dayId,stopId,fieldId)=>{
  const d=DATA.days.find(x=>x.id===dayId);
  if(!d)return;
  const s=d.stops.find(x=>x.id===stopId);
  if(!s||!s.fields)return;
  s.fields=s.fields.filter(f=>f.id!==fieldId);
  render();scheduleSave();
};
function moveStop(srcDayId,srcStopId,tgtDayId,tgtStopId){
  const sd=DATA.days.find(x=>x.id===srcDayId);
  const td=DATA.days.find(x=>x.id===tgtDayId);
  if(!sd||!td)return;
  const idx=sd.stops.findIndex(s=>s.id===srcStopId);
  if(idx===-1)return;
  const[stop]=sd.stops.splice(idx,1);
  const ti=td.stops.findIndex(s=>s.id===tgtStopId);
  td.stops.splice(ti,0,stop);
  render();scheduleSave();
}

function renderPresetGrid() {
  const photoGrid = document.getElementById('presetGrid');
  const colorGrid = document.getElementById('presetColorGrid');
  if (!photoGrid || !colorGrid) return;
  photoGrid.innerHTML = '';
  colorGrid.innerHTML = '';
  const currentUrl = DATA.meta?.coverUrl || '';
  PRESETS.forEach(p => {
    const val = p.color || p.url;
    const isActive = currentUrl === val;
    const wrap = document.createElement('div');
    wrap.className = 'preset-swatch-wrap' + (isActive ? ' active' : '');
    const sw = document.createElement('div');
    sw.className = 'preset-swatch' + (isActive ? ' active' : '');
    if (p.url) {
      const img = document.createElement('img');
      img.src = p.url; img.alt = p.label;
      sw.appendChild(img);
    } else {
      const div = document.createElement('div');
      div.className = 'preset-swatch-color';
      div.style.background = p.color;
      sw.appendChild(div);
    }
    const name = document.createElement('div');
    name.className = 'preset-swatch-name';
    name.textContent = p.label;
    wrap.appendChild(sw);
    wrap.appendChild(name);
    wrap.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      setCover(val, !!p.isGradient);
    });
    if (p.isGradient) colorGrid.appendChild(wrap);
    else photoGrid.appendChild(wrap);
  });
}

function setCover(urlOrGradient, isGradient) {
  if (!DATA.meta) DATA.meta = {};
  DATA.meta.coverUrl = urlOrGradient;
  DATA.meta.coverIsGradient = isGradient;
  applyCover();
  renderPresetGrid();
  scheduleSave();
  document.getElementById('presetPanel').classList.add('hidden');
}

function applyCover() {
  const meta = DATA.meta || {};
  const coverEl = document.getElementById('cover');
  const imgEl = document.getElementById('coverImg');
  if (meta.coverUrl) {
    if (meta.coverIsGradient) {
      imgEl.style.display = 'none';
      coverEl.style.background = meta.coverUrl;
    } else {
      imgEl.src = meta.coverUrl;
      imgEl.style.display = 'block';
      coverEl.style.background = '#1a1a2e';
    }
  } else {
    imgEl.style.display = 'none';
    coverEl.style.background = '#1a1a2e';
  }
  if (meta.title !== undefined)
    document.getElementById('coverTitle').value = meta.title;
  if (meta.subtitle !== undefined)
    document.getElementById('coverSubtitle').value = meta.subtitle;
}

function saveMeta() {
  if (!DATA.meta) DATA.meta = {};
  DATA.meta.title = document.getElementById('coverTitle').value;
  DATA.meta.subtitle = document.getElementById('coverSubtitle').value;
  scheduleSave();
}

// ── FILTER BAR ──
let activeFilterId = 'all';

function renderFilterBar() {
  const bar = document.getElementById('day-filters');
  if (!bar) return;
  bar.innerHTML = '';

  // 全部按鈕
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn filter-all' + (activeFilterId === 'all' ? ' active' : '');
  allBtn.textContent = '全部';
  allBtn.onclick = () => { activeFilterId = 'all'; renderFilterBar(); applyFilter(); };
  bar.appendChild(allBtn);

  // 每天一個按鈕，標籤可編輯
  DATA.days.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilterId === day.id ? ' active' : '');
    btn.setAttribute('data-dayid', day.id);

    const label = document.createElement('span');
    label.className = 'filter-btn-label';
    label.contentEditable = 'true';
    label.spellcheck = false;
    label.textContent = day.num || 'D?';
    label.title = day.title;

    // 點 label 不觸發 btn 的 onclick
    label.onclick = e => e.stopPropagation();
    label.onblur = e => {
      const val = label.textContent.trim();
      if (val) {
        updateDay(day.id, 'num', val);
        // 同步更新行程卡片上的 day-num
        const numEl = document.querySelector(`.day-card[data-id="${day.id}"] .day-num`);
        if (numEl) numEl.textContent = val;
      } else {
        label.textContent = day.num;
      }
    };
    label.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); label.blur(); } };

    btn.onclick = () => { activeFilterId = day.id; renderFilterBar(); applyFilter(); };
    btn.appendChild(label);
    bar.appendChild(btn);
  });
}

function applyFilter() {
  document.querySelectorAll('.day-section').forEach(sec => {
    const card = sec.querySelector('.day-card');
    if (!card) return;
    const id = card.getAttribute('data-id');
    sec.style.display = (activeFilterId === 'all' || id === activeFilterId) ? '' : 'none';
  });
}

window.collapseAll=()=>document.querySelectorAll('.day-card').forEach(c=>c.classList.add('collapsed'));

// ── TOAST ──
window.toast=(msg)=>{
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
};
</script>
</body>
</html>
